[pytest]
DJANGO_SETTINGS_MODULE = pesaplan.settings.test
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=pesaplan
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80
testpaths = 
    pesaplan/apps
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    api: API endpoint tests
    model: Model tests
    view: View tests
